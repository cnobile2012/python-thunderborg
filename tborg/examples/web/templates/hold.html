<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <style type="text/css">
    </style>
    <script src="monster_web.js" defer></script>
  </head>
  <body>
    <iframe src="/stream" width="100%" height="500" frameborder="0"></iframe>
    <iframe id="set_drive" src="/set" width="100%" height="50"
            frameborder="0"></iframe>
    <center>
      <button onmousedown="drive(-1, 1)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Spin Left</b></button>
      <button onmousedown="drive(1, 1)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Forward</b></button>
      <button onmousedown="drive(1, -1)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Spin Right</b></button>
      <br /><br />
      <button onmousedown="drive(0, 1)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Turn Left</b></button>
      <button onmousedown="drive(-1, -1)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Reverse</b></button>
      <button onmousedown="drive(1, 0)" onmouseup="halt()"
              style="width:200px;height:100px;"><b>Turn Right</b></button>
      <br /><br />
      <button onclick="photo()" style="width:200px;height:100px;">
        <b>Save Photo</b></button>
      <br /><br />
      <input id="speed" type="range" min="0" max="100" value="100"
             style="width:600px" />
    </center>
  </body>
</html>
